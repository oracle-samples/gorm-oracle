name: Run Macaron to check supply chain security issues

on:
  push:
    # branches:
    # - main
    paths:
    - .github/workflows/**
  pull_request:
    paths:
    - .github/workflows/**
  workflow_dispatch:
  schedule:
    - cron: "20 15 * * 3"

permissions:
  contents: read

jobs:
  run_macaron:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false

    # Check the GitHub Actions workflows in the repository for vulnerabilities.
    # Note: adjust the policy_purl to refer to your repository URL.
    - name: Run Macaron check-github-actions policy
      uses: oracle/macaron@b31acfe389133a5587d9639063ec70cb84e7bc47 # v0.23.0
      with:
        repo_path: ./
        policy_file: check-github-actions
        policy_purl: pkg:github.com/${{ github.repository }}@.*